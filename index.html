<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>폴리와 함께 냠냠!</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="app-container">
        <h1 class="title">폴리 AI 에너지 충전소 ⚡</h1>
        
        <div class="camera-box">
            <video id="webcam" autoplay muted playsinline></video>
            <div id="loading-msg">AI 카메라 켜는 중... 🤖</div>
        </div>
        
        <div class="character-box">
            <div id="poli-character" class="poli-idle">🚓</div>
            <p id="poli-message">"카메라를 보며 입을 크게 벌려봐!"</p>
        </div>

        <div class="gauge-container">
            <div id="energy-bar" class="energy-bar"></div>
        </div>
        <p class="gauge-text"><span id="eat-count">0</span> / 5번 충전됨</p>

        <button id="eat-btn" class="eat-button">
            🍚 안 될 때는 수동으로 한 입 먹이기
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
